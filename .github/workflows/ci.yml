# ============================================================
# Locale Emulator - CI Workflow
# ============================================================
# .NET 專案用 dotnet build/test（自帶 SDK 解析）
# C++ 專案用 msbuild（VS Build Tools）
# Core 只有 Release|Win32 組態，不建 Debug
# ============================================================

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-2025-vs2026

    steps:
      # --------------------------------------------------------
      # Step 1: Checkout
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Setup .NET 10 SDK
      # --------------------------------------------------------
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # LEProc.Tests needs x86 test host (LEProc has PlatformTarget=x86).
      # Install Windows Desktop Runtime x86 for dotnet test --arch x86.
      - name: Setup .NET 10 Windows Desktop Runtime (x86)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          architecture: x86
          runtime: windowsdesktop

      # --------------------------------------------------------
      # Step 3: Setup MSBuild (for C++ vcxproj)
      # --------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # --------------------------------------------------------
      # Step 4: Restore .NET dependencies
      # --------------------------------------------------------
      - name: Restore .NET dependencies
        run: |
          dotnet restore src/LECommonLibrary/LECommonLibrary.csproj
          dotnet restore src/LEProc/LEProc.csproj
          dotnet restore src/LEGUI/LEGUI.csproj
          dotnet restore tests/LECommonLibrary.Tests/LECommonLibrary.Tests.csproj
          dotnet restore tests/LEProc.Tests/LEProc.Tests.csproj
          dotnet restore tests/LEGUI.Tests/LEGUI.Tests.csproj

      # --------------------------------------------------------
      # Step 5: Build .NET projects (Debug, for tests)
      # --------------------------------------------------------
      - name: Build .NET projects (Debug)
        run: |
          dotnet build src/LECommonLibrary/LECommonLibrary.csproj --configuration Debug --no-restore
          dotnet build src/LEProc/LEProc.csproj --configuration Debug --no-restore
          dotnet build src/LEGUI/LEGUI.csproj --configuration Debug --no-restore
          dotnet build tests/LECommonLibrary.Tests/LECommonLibrary.Tests.csproj --configuration Debug --no-restore
          dotnet build tests/LEProc.Tests/LEProc.Tests.csproj --configuration Debug --no-restore
          dotnet build tests/LEGUI.Tests/LEGUI.Tests.csproj --configuration Debug --no-restore

      # --------------------------------------------------------
      # Step 6: Run .NET tests (x64)
      # --------------------------------------------------------
      - name: Run .NET tests (x64)
        run: |
          dotnet test tests/LECommonLibrary.Tests/LECommonLibrary.Tests.csproj --no-build --configuration Debug --logger "console;verbosity=detailed"
          dotnet test tests/LEGUI.Tests/LEGUI.Tests.csproj --no-build --configuration Debug --logger "console;verbosity=detailed"

      # --------------------------------------------------------
      # Step 7: Run LEProc.Tests (x86)
      # --------------------------------------------------------
      # LEProc has PlatformTarget=x86, needs x86 test host.
      # --arch x86 requires Windows Desktop Runtime x86.
      # Cannot use --no-build (rebuilds for x86 architecture).
      - name: Run LEProc.Tests (x86)
        run: dotnet test tests/LEProc.Tests/LEProc.Tests.csproj --arch x86 --configuration Debug --logger "console;verbosity=detailed"

      # --------------------------------------------------------
      # Step 8: Build C++ projects (Release|Win32)
      # --------------------------------------------------------
      # Core only has Release|Win32 config. All x86 C++ projects
      # built here: Core, ShellExtension, LocaleTestApp, Core.Tests.
      - name: Build C++ (Release|Win32)
        run: |
          msbuild src/Core/LoaderDll/LoaderDll.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal
          msbuild src/Core/LocaleEmulator/LocaleEmulator.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal
          msbuild src/Core/Loader/Loader.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal
          msbuild src/ShellExtension/ShellExtension.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal
          msbuild tests/SmokeTest/LocaleTestApp/LocaleTestApp.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal
          msbuild tests/Core.Tests/Core.Tests.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal

      # --------------------------------------------------------
      # Step 9: Build C++ projects (Release|x64)
      # --------------------------------------------------------
      # ShellExtension (x64 for 64-bit Explorer) and its tests.
      - name: Build C++ (Release|x64)
        run: |
          msbuild src/ShellExtension/ShellExtension.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal
          msbuild tests/ShellExtension.Tests/ShellExtension.Tests.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

      # --------------------------------------------------------
      # Step 10: Run C++ tests
      # --------------------------------------------------------
      - name: Run C++ tests
        run: |
          $failed = $false

          # x86 tests (Core.Tests)
          $testExes86 = Get-ChildItem -Path "Build\Release\x86" -Filter "*Tests*.exe" -Recurse -ErrorAction SilentlyContinue
          foreach ($exe in $testExes86) {
            Write-Host "Running: $($exe.FullName)" -ForegroundColor Cyan
            & $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAILED: $($exe.Name)" -ForegroundColor Red
              $failed = $true
            }
          }

          # x64 tests (ShellExtension.Tests)
          $testExes64 = Get-ChildItem -Path "Build\Release\x64" -Filter "*Tests*.exe" -Recurse -ErrorAction SilentlyContinue
          foreach ($exe in $testExes64) {
            Write-Host "Running: $($exe.FullName)" -ForegroundColor Cyan
            & $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAILED: $($exe.Name)" -ForegroundColor Red
              $failed = $true
            }
          }

          if ($failed) { exit 1 }
        shell: pwsh

      # --------------------------------------------------------
      # Step 11: Smoke Tests
      # --------------------------------------------------------
      - name: Smoke Tests
        run: .\tests\SmokeTest\Invoke-SmokeTest.ps1
        shell: pwsh
        if: success()

      # --------------------------------------------------------
      # Step 12: Upload build artifacts
      # --------------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            Build/Release/x86/
            Build/Release/x64/
          retention-days: 7
